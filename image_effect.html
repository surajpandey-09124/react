<!doctype html>
<html lang="en-us">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title></title>
        <link rel="icon" href="picture/suraj.jpeg">
        <style>
            *{
                box-sizing:border-box;
            }
            
            #d1{
                width:50%;
                height:500px;
                border:10px groove navy;
                margin:50px auto;
            }

            #pic{
                width:95%;
                height:70%;
                margin:15px 0 0 17px;
            }

            #d2,#d3,#d4{
                width:30%;
                height:100px;
                border:5px groove navy;
                float:left;
                margin:10px 5px 0 15px;
            }

            p{
                color:navy;
                font-family:centurygothic;
                font-size:20px;
                text-align:center;
            }

            input{
                margin-left:25%;
            }
        </style>
    </head>
    <body>
        <div id="d1">
            <img src="picture/nature.jpg" id="pic">
            <nav id="d2">
                <p>Brightness</p>
                <input type="range" min="0" max="300" oninput="show()" id="bright">
            </nav>
            <nav id="d3">
                <p>Contrast</p>
                <input type="range" min="0" max="300" oninput="show2()" id="contrast">
            </nav>
            <nav id="d4">
                <p>Saturate</p>
                <input type="range" min="0" max="300" oninput="show3()" id="saturate">
            </nav>
        </div>
        <script>satu
            function show(){
            var a=document.getElementById('bright').value;
            var b=document.getElementById('pic');
            b.style.filter='brightness('+a+'%)';
            }

            function show2(){
                var a=document.getElementById('contrast').value;
                var b=document.getElementById('pic');
                b.style.filter='contrast('+a+'%)';
            }

            function show3(){
                var a=document.getElementById('saturate').value;
                var b=document.getElementById('pic');
                b.style.filter='saturate('+a+'%)';
            }
        </script>
    </body>
</html>
