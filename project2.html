<!doctype html>
<html lang="en-us">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title></title>
        <link rel="stylesheet" href="project2style.css">
        <link rel="icon" href="picture/suraj.jpeg">
    </head>
    <body>
<header>
    <h1>STP VIDEO PLAYER</h1>
</header>
<section>
    <video src="picture/1.mp4" width='100%' height='400px' id="show"></video>
</section>
<footer>
    <button id="btn">Upload
        <input type="file" id="link" accept="all format" onchange="show()">
    </button>
    <button id="btn2" onclick="btn2()">Play</button>
    <button id="btn3" onclick="btn3()">Pause</button>
</footer>
<script>
    function btn2(){
        var a=document.getElementById('show');
        a.play();
    }

    function btn3(){
        var b=document.getElementById('show');
        b.pause();
    }

    function show(){
        var c=document.getElementById('link').value.replace(/.*(\/|\\)/,'');
        var d=document.getElementById('show');
        d.src=c;
    }
</script>
    </body>
</html>
